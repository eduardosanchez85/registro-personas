<!doctype html>
<html lang="es">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Asistentes</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet" />

    <link rel="icon" href="./assets/icono/GoyitoRegistro.png" type="image/png">

    <link rel="stylesheet" href="estilos.css" />
</head>

<body data-page="asistentes">
    <div id="app" class="min-vh-100">

        <nav class="navbar-glass sticky-top">
            <div class="container max-w-4xl py-3 px-3 px-md-4">
                <div class="d-flex align-items-center justify-content-between flex-wrap gap-3">
                    <h1 id="nav-title" class="fs-5 fw-semibold m-0">Evento: Micro credenciales</h1>

                    <div class="pill-switch">
                        <a href="index.html" id="btn-registro" class="nav-pill text-decoration-none">
                            Registro
                        </a>
                        <a href="asistentes.html" id="btn-asistentes" class="nav-pill active text-decoration-none">
                            Asistentes
                        </a>
                    </div>
                </div>
            </div>
        </nav>

        <main class="container max-w-2xl px-3 px-md-4 py-5">
            <div class="d-flex align-items-center justify-content-between flex-wrap gap-3 mb-4 slide-up" id="totalAsistentes">
                <div>
                    <h2 class="fw-bold mb-1">Asistentes</h2>
                    <p class="small m-0 text-secondary-custom">
                        <span id="attendee-count">0</span> personas registradas
                    </p>
                </div>
            </div>

            <div id="loading" class="text-center py-4 d-none">
                <div class="spinner-border text-dark" role="status"></div>
                <p class="mt-2 mb-0">Cargando asistentes...</p>
            </div>

            <div class="mb-4 fade-in" id="buscador">
                <div class="search-wrapper">
                    <input type="text" id="search-input" class="form-control custom-input search-input"
                        placeholder="Buscar por nombre" />
                </div>
            </div>



            <div id="empty-state" class="text-center py-5 fade-in">
                <div class="empty-circle mb-4 mx-auto">
                    <svg width="32" height="32" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5"
                            d="M17 20h5v-2a3 3 0 00-5.356-1.857M17 20H7m10 0v-2c0-.656-.126-1.283-.356-1.857M7 20H2v-2a3 3 0 015.356-1.857M7 20v-2c0-.656.126-1.283.356-1.857m0 0a5.002 5.002 0 019.288 0M15 7a3 3 0 11-6 0 3 3 0 016 0zm6 3a2 2 0 11-4 0 2 2 0 014 0zM7 10a2 2 0 11-4 0 2 2 0 014 0z" />
                    </svg>
                </div>

                <h3 class="fs-5 fw-semibold mb-2">Sin asistentes aún</h3>
                <p class="small m-0 text-secondary-custom">
                    Los registros aparecerán aquí
                </p>
            </div>

            <div id="attendees-list" class="d-flex flex-column gap-3"></div>
        </main>
    </div>

    <script src="app.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
